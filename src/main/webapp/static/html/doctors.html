<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HMS – Doctors</title>
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🏥</div><div><span>MediCore HMS</span></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a class="nav-item" data-page="dashboard" href="dashboard.html"><span class="nav-icon">📊</span>Dashboard</a>
      <div class="nav-section-label">Management</div>
      <a class="nav-item" data-page="patients" href="patients.html"><span class="nav-icon">🧑‍⚕️</span>Patients</a>
      <a class="nav-item" data-page="doctors" href="doctors.html"><span class="nav-icon">👨‍⚕️</span>Doctors</a>
      <a class="nav-item" data-page="appointments" href="appointments.html"><span class="nav-icon">📅</span>Appointments</a>
      <a class="nav-item" data-page="billing" href="billing.html"><span class="nav-icon">💳</span>Billing</a>
      <a class="nav-item" data-page="prescriptions" href="prescriptions.html"><span class="nav-icon">💊</span>Prescriptions</a>
      <div class="nav-section-label" data-role="ADMIN">System</div>
      <a class="nav-item" data-page="users" data-role="ADMIN" href="users.html"><span class="nav-icon">👥</span>Users</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="user-avatar" id="sidebar-avatar">A</div>
        <div class="user-info"><strong id="sidebar-username">…</strong><span id="sidebar-role">—</span></div>
        <button class="btn-logout" onclick="logout()">⏻</button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title">Doctor Management</span>
      <div class="topbar-actions">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input id="search-input" type="text" placeholder="Search by specialization…" oninput="debounceSearch(this.value)"/>
        </div>
        <button class="btn btn-primary" onclick="openModal('doctor-modal');clearForm()">➕ Add Doctor</button>
      </div>
    </header>

    <main class="page-content fade-in">
      <!-- Doctor cards grid -->
      <div id="doctors-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">
        <div style="grid-column:1/-1;text-align:center;padding:40px"><div class="spinner"></div></div>
      </div>
    </main>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="doctor-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add Doctor</h3>
      <button class="modal-close" onclick="closeModal('doctor-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="d-id"/>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input id="d-name" class="form-control" type="text" placeholder="Dr. Full Name"/>
        </div>
        <div class="form-group">
          <label>Specialization</label>
          <input id="d-spec" class="form-control" type="text" placeholder="e.g. Cardiologist"/>
        </div>
      </div>
      <div class="form-group">
        <label>Contact Number</label>
        <input id="d-contact" class="form-control" type="tel" placeholder="10-digit number"/>
      </div>
      <div class="form-group">
        <label>Availability Schedule</label>
        <textarea id="d-schedule" class="form-control" placeholder="e.g. Mon-Fri 09:00-13:00"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('doctor-modal')">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveDoctor()">Save Doctor</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
let doctors = [];
let searchTimer = null;

(async () => {
  await requireAuth();
  initSidebar('doctors');
  loadDoctors();
})();

async function loadDoctors(spec = '') {
  const res = await API.doctors.getAll(spec);
  if (!res.success) { toast(res.message, 'error'); return; }
  doctors = res.data || [];
  renderCards(doctors);
}

function renderCards(data) {
  const grid = document.getElementById('doctors-grid');
  if (!data.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">👨‍⚕️</div><p>No doctors found</p></div>';
    return;
  }
  const colors = ['blue','green','amber','purple','red'];
  grid.innerHTML = data.map((d, i) => `
    <div class="card" style="position:relative">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
        <div class="stat-icon ${colors[i % colors.length]}" style="width:52px;height:52px;font-size:1.6rem;flex-shrink:0">👨‍⚕️</div>
        <div>
          <div style="font-weight:700;font-size:1rem">${d.name}</div>
          <span class="badge badge-blue">${d.specialization || 'General'}</span>
        </div>
      </div>
      <div style="font-size:.82rem;color:var(--text-secondary);margin-bottom:6px">📞 ${d.contactNumber || '—'}</div>
      <div style="font-size:.82rem;color:var(--text-secondary);margin-bottom:16px">🗓 ${d.availabilitySchedule || '—'}</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" style="flex:1" onclick="editDoctor(${d.doctorId})">✏️ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteDoctor(${d.doctorId})">🗑</button>
      </div>
    </div>`).join('');
}

function debounceSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadDoctors(val), 400);
}

function clearForm() {
  ['d-id','d-name','d-spec','d-contact','d-schedule'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('modal-title').textContent = 'Add Doctor';
}

function editDoctor(id) {
  const d = doctors.find(x => x.doctorId === id);
  if (!d) return;
  document.getElementById('modal-title').textContent = 'Edit Doctor';
  document.getElementById('d-id').value       = d.doctorId;
  document.getElementById('d-name').value     = d.name || '';
  document.getElementById('d-spec').value     = d.specialization || '';
  document.getElementById('d-contact').value  = d.contactNumber || '';
  document.getElementById('d-schedule').value = d.availabilitySchedule || '';
  openModal('doctor-modal');
}

async function saveDoctor() {
  const id   = document.getElementById('d-id').value;
  const data = {
    name:                 document.getElementById('d-name').value.trim(),
    specialization:       document.getElementById('d-spec').value.trim() || null,
    contactNumber:        document.getElementById('d-contact').value.trim() || null,
    availabilitySchedule: document.getElementById('d-schedule').value.trim() || null,
  };
  if (!data.name) { toast('Doctor name is required', 'error'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const res = id ? await API.doctors.update(id, data) : await API.doctors.create(data);
  btn.disabled = false; btn.innerHTML = 'Save Doctor';
  if (res.success) { toast(res.message, 'success'); closeModal('doctor-modal'); loadDoctors(); }
  else toast(res.message, 'error');
}

async function deleteDoctor(id) {
  if (!confirm('Delete this doctor?')) return;
  const res = await API.doctors.delete(id);
  if (res.success) { toast('Doctor deleted', 'success'); loadDoctors(); }
  else toast(res.message, 'error');
}
</script>
</body>
</html>
