<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HMS – User Management</title>
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>
<div id="toast-container"></div>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🏥</div><div><span>MediCore HMS</span></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a class="nav-item" data-page="dashboard" href="dashboard.html"><span class="nav-icon">📊</span>Dashboard</a>
      <div class="nav-section-label">Management</div>
      <a class="nav-item" data-page="patients" href="patients.html"><span class="nav-icon">🧑‍⚕️</span>Patients</a>
      <a class="nav-item" data-page="doctors" href="doctors.html"><span class="nav-icon">👨‍⚕️</span>Doctors</a>
      <a class="nav-item" data-page="appointments" href="appointments.html"><span class="nav-icon">📅</span>Appointments</a>
      <a class="nav-item" data-page="billing" href="billing.html"><span class="nav-icon">💳</span>Billing</a>
      <a class="nav-item" data-page="prescriptions" href="prescriptions.html"><span class="nav-icon">💊</span>Prescriptions</a>
      <div class="nav-section-label">System</div>
      <a class="nav-item" data-page="users" href="users.html"><span class="nav-icon">👥</span>Users</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="user-avatar" id="sidebar-avatar">A</div>
        <div class="user-info"><strong id="sidebar-username">…</strong><span id="sidebar-role">—</span></div>
        <button class="btn-logout" onclick="logout()">⏻</button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title">User Management</span>
      <div class="topbar-actions">
        <span style="font-size:.8rem;color:var(--text-secondary)">🔒 Admin Only</span>
        <button class="btn btn-primary" onclick="openModal('user-modal');clearForm()">➕ Add User</button>
      </div>
    </header>

    <main class="page-content fade-in">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr><th>#</th><th>User ID</th><th>Username</th><th>Role</th><th>Actions</th></tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="5" style="text-align:center;padding:40px"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<!-- Add/Edit User Modal -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="user-modal-title">Add User</h3>
      <button class="modal-close" onclick="closeModal('user-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="u-id"/>
      <div class="form-group">
        <label>Username *</label>
        <input id="u-username" class="form-control" type="text" placeholder="Choose a username"/>
      </div>
      <div class="form-group">
        <label id="u-pass-label">Password *</label>
        <div style="position:relative">
          <input id="u-password" class="form-control" type="password" placeholder="Enter password" style="padding-right: 35px;"/>
          <span style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; opacity:0.6; user-select:none;" onclick="togglePassword('u-password', this)">👁️</span>
        </div>
        <small style="color:var(--text-secondary);font-size:.75rem" id="u-pass-hint"></small>
      </div>
      <div class="form-group">
        <label>Role *</label>
        <select id="u-role" class="form-control">
          <option value="PATIENT">Patient</option>
          <option value="DOCTOR">Doctor</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('user-modal')">Cancel</button>
      <button class="btn btn-primary" id="user-save-btn" onclick="saveUser()">Save User</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
let users = [];
let currentUserId = null;

(async () => {
  const me = await requireAuth();
  if (!me) return;
  if (me.role !== 'ADMIN') {
    toast('Access denied. Admins only.', 'error');
    setTimeout(() => window.location.href = 'dashboard.html', 1500);
    return;
  }
  currentUserId = me.userId;
  initSidebar('users');
  loadUsers();
})();

async function loadUsers() {
  const res = await API.users.getAll();
  if (!res.success) { toast(res.message, 'error'); return; }
  users = res.data || [];
  renderTable(users);
}

function renderTable(data) {
  const tbody = document.getElementById('users-tbody');
  if (!data.length) { tbody.innerHTML = emptyRow(5, 'No users found'); return; }
  tbody.innerHTML = data.map((u, i) => `
    <tr>
      <td>${i + 1}</td>
      <td><code style="font-size:.8rem;color:var(--text-secondary)">#${u.userId}</code></td>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="user-avatar" style="width:30px;height:30px;font-size:.75rem;flex-shrink:0">
            ${(u.username || 'U')[0].toUpperCase()}
          </div>
          <strong>${u.username}</strong>
          ${u.userId == currentUserId ? '<span class="badge badge-blue" style="font-size:.65rem">You</span>' : ''}
        </div>
      </td>
      <td>${statusBadge(u.role)}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary btn-sm" onclick="editUser(${u.userId})">✏️ Edit Role</button>
          ${u.userId != currentUserId
            ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.userId})">🗑 Delete</button>`
            : '<span style="font-size:.75rem;color:var(--text-secondary)">Protected</span>'}
        </div>
      </td>
    </tr>`).join('');
}

function clearForm() {
  ['u-id','u-username','u-password'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('u-role').value = 'PATIENT';
  document.getElementById('user-modal-title').textContent = 'Add User';
  document.getElementById('u-pass-hint').textContent = '';
  document.getElementById('u-pass-label').textContent = 'Password *';
  document.getElementById('u-username').disabled = false;
}

function editUser(id) {
  const u = users.find(x => x.userId === id);
  if (!u) return;
  document.getElementById('user-modal-title').textContent = 'Edit User';
  document.getElementById('u-id').value       = u.userId;
  document.getElementById('u-username').value = u.username;
  document.getElementById('u-username').disabled = true;
  document.getElementById('u-role').value     = u.role;
  document.getElementById('u-password').value = '';
  document.getElementById('u-pass-label').textContent = 'New Password';
  document.getElementById('u-pass-hint').textContent = 'Leave blank to keep existing password';
  openModal('user-modal');
}

async function saveUser() {
  const id       = document.getElementById('u-id').value;
  const username = document.getElementById('u-username').value.trim();
  const password = document.getElementById('u-password').value;
  const role     = document.getElementById('u-role').value;

  if (!username) { toast('Username is required', 'error'); return; }
  if (!id && !password) { toast('Password is required for new users', 'error'); return; }

  const btn = document.getElementById('user-save-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';

  let res;
  if (id) {
    const data = { username, role };
    if (password) data.password = password;
    res = await API.users.update(id, data);
  } else {
    res = await API.auth.register(username, password, role);
  }

  btn.disabled = false; btn.textContent = 'Save User';
  if (res.success) { toast(res.message, 'success'); closeModal('user-modal'); loadUsers(); }
  else toast(res.message, 'error');
}

async function deleteUser(id) {
  if (!confirm('Delete this user? This cannot be undone.')) return;
  const res = await API.users.delete(id);
  if (res.success) { toast('User deleted', 'success'); loadUsers(); }
  else toast(res.message, 'error');
}
</script>
</body>
</html>
